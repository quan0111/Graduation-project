version: "3.9"

services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: DATN
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: ./BE
    container_name: ecommerce_backend
    ports:
      - "8000:8000"
    env_file:
      - ./BE/.env
    depends_on:
      - db
      - redis

  user-fe:
    build: ./user-fe
    container_name: ecommerce_user
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin-fe:
    build: ./admin-fe
    container_name: ecommerce_admin
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: